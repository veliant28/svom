services:
  postgres:
    image: postgres:18.3
    container_name: svom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-svom}
      POSTGRES_USER: ${POSTGRES_USER:-svom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svom}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  redis:
    image: redis:8.0.6
    container_name: svom_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    container_name: svom_elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: svom_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1},backend,svom_backend
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_CACHE_URL: redis://redis:6379/1
      REDIS_CELERY_URL: redis://redis:6379/2
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SEARCH_BACKEND: ${SEARCH_BACKEND:-elasticsearch}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: bash -lc "python manage.py migrate && daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile
    container_name: svom_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
      NEXT_SERVER_API_BASE_URL: ${NEXT_SERVER_API_BASE_URL:-http://backend:8000/api}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

  celery_worker:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: svom_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_CACHE_URL: redis://redis:6379/1
      REDIS_CELERY_URL: redis://redis:6379/2
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SEARCH_BACKEND: ${SEARCH_BACKEND:-elasticsearch}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: bash -lc "celery -A config worker -l info"

  celery_beat:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: svom_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_CACHE_URL: redis://redis:6379/1
      REDIS_CELERY_URL: redis://redis:6379/2
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SEARCH_BACKEND: ${SEARCH_BACKEND:-elasticsearch}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: bash -lc "celery -A config beat -l info"

volumes:
  postgres_data:
  redis_data:
  elastic_data:
  frontend_node_modules:
  frontend_next:
