services:
  postgres:
    image: postgres:18.3
    container_name: svom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-svom}
      POSTGRES_USER: ${POSTGRES_USER:-svom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svom}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  redis:
    image: redis:8.0.6
    container_name: svom_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    container_name: svom_elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: svom_backend
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_CACHE_URL: redis://redis:6379/1
      REDIS_CELERY_URL: redis://redis:6379/2
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SEARCH_BACKEND: ${SEARCH_BACKEND:-elasticsearch}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: bash -lc "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    container_name: svom_celery_worker
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_CACHE_URL: redis://redis:6379/1
      REDIS_CELERY_URL: redis://redis:6379/2
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SEARCH_BACKEND: ${SEARCH_BACKEND:-elasticsearch}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: bash -lc "celery -A config worker -l info"

volumes:
  postgres_data:
  redis_data:
  elastic_data:
